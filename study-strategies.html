<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Science of Learning — Teacher's Aid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090d17;
  --surface: #111827;
  --surface2: #1a2236;
  --border: rgba(255,255,255,0.07);
  --text: #dde2f0;
  --muted: #68738f;
  --c1: #3dd6c8; --c2: #f5c842; --c3: #f4705a;
  --c4: #b988f7; --c5: #62c98c; --c6: #41bedd; --c7: #9e90ee;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow: hidden; }

/* ──────────── VIEWS ──────────── */
.view { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity .35s ease, transform .35s ease; }
.view.hidden { opacity: 0; pointer-events: none; transform: translateX(30px); }

/* ──────────── HUB ──────────── */
#hub { padding: 28px 36px 24px; gap: 0; }
.hub-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 22px; }
.hub-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 700; line-height: 1; }
.hub-title em { color: var(--c2); font-style: italic; }
.hub-sub { font-size: .78rem; color: var(--muted); font-weight: 300; margin-top: 5px; letter-spacing: .02em; }
.hub-sub b { color: var(--text); font-weight: 500; }

.synth-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 8px 18px; border-radius: 6px; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: .75rem;
  letter-spacing: .08em; text-transform: uppercase; transition: all .2s;
}
.synth-btn:hover { border-color: var(--c2); color: var(--c2); }

.cards-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: 1fr 1fr;
  gap: 14px;
  flex: 1;
  min-height: 0;
}
/* Center the bottom 3 cards */
.card:nth-child(5) { grid-column: 1; }
.card:nth-child(6) { grid-column: 2; }
.card:nth-child(7) { grid-column: 3; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 8px;
  animation: fadeUp .4s both;
  transition: transform .2s, border-color .2s, box-shadow .2s;
}
.card:nth-child(1){animation-delay:.04s} .card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s} .card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s} .card:nth-child(6){animation-delay:.24s}
.card:nth-child(7){animation-delay:.28s}
.card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: var(--acc); border-radius: 10px 10px 0 0;
}
.card:hover { transform: translateY(-4px); border-color: var(--acc); box-shadow: 0 16px 48px rgba(0,0,0,.5); }

.card-icon { font-size: 1.6rem; line-height: 1; }
.card-num {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  color: var(--acc); letter-spacing: .12em; text-transform: uppercase; opacity: .8;
}
.card-name {
  font-family: 'Playfair Display', serif; font-size: 1rem;
  font-weight: 700; line-height: 1.15; flex: 1;
}
.card-tip {
  font-size: .72rem; color: var(--muted); line-height: 1.4;
  font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px;
}
.diff-row { display: flex; align-items: center; gap: 6px; }
.diff-label { font-size: .6rem; color: var(--muted); }
.diff-dots { display: flex; gap: 3px; }
.dd { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
.dd.on { background: var(--acc); }

/* ──────────── FOCUS VIEW ──────────── */
#focus { }
.focus-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 32px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.back-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: .82rem;
  display: flex; align-items: center; gap: 7px; transition: color .2s;
}
.back-btn:hover { color: var(--text); }
.nav-btns { display: flex; gap: 8px; align-items: center; }
.nav-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); width: 34px; height: 34px; border-radius: 6px;
  cursor: pointer; font-size: .9rem; transition: all .2s;
  display:flex; align-items:center; justify-content:center;
}
.nav-btn:hover { color: var(--text); border-color: var(--acc); }
.nav-counter { font-size: .75rem; color: var(--muted); font-family: 'Space Mono', monospace; }

.focus-body { flex: 1; display: grid; grid-template-columns: 280px 1fr; min-height: 0; }
.focus-side {
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 32px 28px; display: flex; flex-direction: column; gap: 18px; overflow: hidden;
}
.focus-icon { font-size: 2.8rem; line-height: 1; }
.focus-num { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--acc); letter-spacing: .12em; text-transform: uppercase; }
.focus-title { font-family: 'Playfair Display', serif; font-size: 1.65rem; font-weight: 700; line-height: 1.1; }

.eff-block { margin-top: auto; }
.eff-head { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.eff-track { background: var(--border); border-radius: 3px; height: 4px; margin-bottom: 4px; overflow: hidden; }
.eff-fill { height: 100%; border-radius: 3px; background: var(--acc); width: 0; transition: width 1s .3s ease; }
.eff-labels { display: flex; justify-content: space-between; font-size: .6rem; color: var(--muted); }

.prog-list { display: flex; flex-direction: column; gap: 5px; }
.prog-item {
  display: flex; align-items: center; gap: 9px;
  font-size: .73rem; color: var(--muted); cursor: pointer;
  padding: 3px 0; border-radius: 4px; transition: color .15s;
}
.prog-item.done { color: var(--acc); }
.prog-item.active { color: var(--text); }
.prog-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border); flex-shrink: 0; transition: background .2s, box-shadow .2s;
}
.prog-item.done .prog-dot { background: var(--acc); }
.prog-item.active .prog-dot { background: var(--text); box-shadow: 0 0 6px rgba(255,255,255,.4); }

.focus-main {
  padding: 32px 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
}
.sec {
  border-left: 2px solid var(--acc); background: var(--surface);
  border-radius: 0 8px 8px 0; padding: 16px 20px;
  opacity: 0; transform: translateY(14px);
  transition: opacity .45s ease, transform .45s ease;
}
.sec.show { opacity: 1; transform: translateY(0); }
.sec-tag {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  color: var(--acc); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px;
}
.sec-body { font-size: .88rem; line-height: 1.7; color: var(--text); }
.sec-body strong { color: var(--acc); font-weight: 600; }
.sec-body em { color: var(--text); font-style: italic; opacity: .85; }

.app-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.app-item {
  background: var(--bg); border-radius: 6px; padding: 10px 14px;
  font-size: .83rem; line-height: 1.55; display: flex; gap: 10px;
}
.app-bullet { color: var(--acc); font-weight: 700; flex-shrink: 0; font-size: 1rem; margin-top: -1px; }

.tip-sec {
  border: none; background: var(--acc); border-radius: 8px; padding: 18px 22px;
}
.tip-sec .sec-tag { color: var(--bg); opacity: .7; }
.tip-sec .sec-body {
  font-family: 'Playfair Display', serif; font-size: 1.05rem;
  font-style: italic; color: var(--bg); line-height: 1.5;
}

.reveal-next {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  border: 1px dashed var(--border); border-radius: 8px; padding: 14px;
  color: var(--muted); font-size: .78rem; cursor: pointer; transition: all .2s;
  flex-shrink: 0;
}
.reveal-next:hover { border-color: var(--acc); color: var(--acc); }
.pulse { animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ──────────── SYNTHESIS ──────────── */
#synthesis { padding: 28px 36px; }
.synth-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.synth-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
.synth-title span { color: var(--muted); font-size: .85rem; font-weight: 400; font-family: 'Outfit', sans-serif; margin-left: 12px; }
.synth-svg-wrap { flex: 1; min-height: 0; position: relative; }
#synth-svg { width: 100%; height: 100%; }

/* Tooltip */
.tooltip {
  position: fixed; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: .78rem; line-height: 1.5;
  pointer-events: none; opacity: 0; transition: opacity .2s;
  max-width: 240px; z-index: 100;
}
.tooltip.show { opacity: 1; }
.tooltip-title { font-weight: 600; margin-bottom: 3px; }

/* ──────────── KBD HINT ──────────── */
.kbd-hint {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: .68rem; color: var(--muted);
  display: flex; align-items: center; gap: 8px; pointer-events: none;
  opacity: 0; transition: opacity .3s; z-index: 50;
}
.kbd-hint.show { opacity: 1; }
kbd { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-family: 'Space Mono', monospace; font-size: .62rem; }

@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

/* ──────────── FORGETTING CURVE ──────────── */
.fc-wrap {
  margin-top: 14px;
  background: var(--bg);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.fc-svg-area { width: 100%; display: block; cursor: default; }
.fc-review-dot { cursor: pointer; transition: r .15s; }
.fc-review-dot:hover { r: 7; }
.fc-dot-ring { pointer-events: none; }

.fc-info-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.fc-info-panel.open { max-height: 100px; }
.fc-info-inner {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.fc-info-num {
  font-family: 'Space Mono', monospace;
  font-size: .6rem; color: var(--c1);
  letter-spacing: .1em; text-transform: uppercase;
  flex-shrink: 0; padding-top: 2px;
}
.fc-info-text { font-size: .8rem; line-height: 1.55; color: var(--text); }
.fc-info-text strong { color: var(--c1); }
.fc-legend {
  display: flex; gap: 16px; padding: 0 16px 10px;
  font-size: .67rem; color: var(--muted); align-items: center;
}
.fc-leg-line {
  display: inline-block; width: 18px; height: 2px;
  border-radius: 2px; vertical-align: middle; margin-right: 5px;
}
.fc-hint {
  font-size: .62rem; color: var(--muted); text-align: center;
  padding: 0 0 8px; opacity: .7;
  font-family: 'Space Mono', monospace; letter-spacing: .04em;
}

/* ──────────── PLOT TWIST CHART ──────────── */
.pt-wrap {
  margin-top: 14px; background: var(--bg);
  border-radius: 6px; border: 1px solid var(--border); overflow: hidden;
}
.pt-phases {
  display: flex; border-bottom: 1px solid var(--border);
}
.pt-phase-tab {
  flex: 1; padding: 9px 0; text-align: center;
  font-family: 'Space Mono', monospace; font-size: .58rem;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--muted); border-bottom: 2px solid transparent;
  transition: all .35s; margin-bottom: -1px; cursor: pointer;
}
.pt-phase-tab.active { color: var(--c2); border-bottom-color: var(--c2); background: rgba(245,200,66,.04); }
.pt-chart-area {
  padding: 18px 32px 0;
  display: flex; gap: 20px; align-items: flex-end;
  height: 178px; position: relative;
}
.pt-y-labels {
  display: flex; flex-direction: column; justify-content: space-between;
  padding-bottom: 0; height: 130px; flex-shrink: 0;
}
.pt-y-label {
  font-size: .6rem; color: var(--muted);
  font-family: 'Space Mono', monospace; text-align: right;
}
.pt-bars-row { flex: 1; display: flex; gap: 16px; align-items: flex-end; height: 100%; }
.pt-bar-group {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end; height: 100%; gap: 0;
}
.pt-bar-val {
  font-family: 'Space Mono', monospace; font-size: .82rem;
  font-weight: 700; color: var(--muted); min-height: 20px;
  transition: color .4s; display: flex; align-items: center;
}
.pt-bar-val.winner { color: var(--c2); }
.pt-bar-val.loser  { color: rgba(255,255,255,.2); }
.pt-bar-track {
  width: 100%; border-radius: 4px 4px 0 0;
  height: 130px; position: relative;
  background:
    linear-gradient(transparent calc(25% - .5px), rgba(255,255,255,.09) calc(25% - .5px), rgba(255,255,255,.09) calc(25% + .5px), transparent calc(25% + .5px)),
    linear-gradient(transparent calc(50% - .5px), rgba(255,255,255,.13) calc(50% - .5px), rgba(255,255,255,.13) calc(50% + .5px), transparent calc(50% + .5px)),
    linear-gradient(transparent calc(75% - .5px), rgba(255,255,255,.09) calc(75% - .5px), rgba(255,255,255,.09) calc(75% + .5px), transparent calc(75% + .5px)),
    var(--surface2);
}
.pt-bar {
  width: 100%; position: absolute; bottom: 0; left: 0;
  border-radius: 4px 4px 0 0;
  transition: height .85s cubic-bezier(.34,1.08,.64,1);
}
.pt-bar.reread-bar    { background: rgba(255,255,255,.13); }
.pt-bar.retrieval-bar { background: var(--c2); }
.pt-bar-name {
  font-size: .7rem; color: var(--muted); text-align: center;
  padding: 7px 4px 0; line-height: 1.35;
}
.pt-question {
  padding: 10px 20px 12px; font-size: .82rem; color: var(--text);
  font-style: italic; text-align: center; line-height: 1.55;
  transition: opacity .3s, max-height .3s; overflow: hidden;
}
.pt-question.gone { opacity:0; max-height:0; padding:0; pointer-events:none; }
.pt-reveal-btn {
  display: block; width: calc(100% - 32px); margin: 0 16px 14px;
  background: none; border: 1px solid rgba(245,200,66,.3);
  color: var(--c2); padding: 10px; border-radius: 6px;
  cursor: pointer; font-family: 'Outfit', sans-serif; font-size: .82rem;
  letter-spacing: .02em; transition: all .2s; text-align: center;
}
.pt-reveal-btn:hover { background: rgba(245,200,66,.08); border-color: var(--c2); }
.pt-reveal-btn.gone { display: none; }
.pt-insight { max-height: 0; overflow: hidden; transition: max-height .45s ease; border-top: 1px solid var(--border); }
.pt-insight.open { max-height: 120px; }
.pt-insight-inner { padding: 13px 20px; font-size: .82rem; line-height: 1.65; color: var(--text); }
.pt-insight-inner strong { color: var(--c2); }

/* goal selector */
.pt-goal-row {
  display: flex; gap: 8px; padding: 12px 16px 0;
}
.pt-goal-btn {
  flex: 1; padding: 9px 10px; border-radius: 6px; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: .78rem; text-align: center;
  border: 1px solid var(--border); background: none; color: var(--muted);
  transition: all .2s; line-height: 1.35;
}
.pt-goal-btn:hover { border-color: var(--c2); color: var(--text); }
.pt-goal-btn.selected-cram { border-color: rgba(255,100,70,.6); color: rgba(255,130,100,1); background: rgba(255,100,70,.06); }
.pt-goal-btn.selected-learn { border-color: var(--c2); color: var(--c2); background: rgba(245,200,66,.06); }

/* the catch callout */
.pt-catch {
  margin: 0 16px; border-radius: 6px; overflow: hidden;
  max-height: 0; transition: max-height .4s ease;
}
.pt-catch.open { max-height: 120px; }
.pt-catch-inner {
  padding: 11px 14px; font-size: .8rem; line-height: 1.6;
  border: 1px solid rgba(255,100,70,.35); border-radius: 6px;
  background: rgba(255,100,70,.06); color: var(--text);
}
.pt-catch-inner.good {
  border-color: rgba(245,200,66,.35); background: rgba(245,200,66,.05);
}
.pt-catch-inner em { color: rgba(255,140,110,1); font-style: normal; font-weight: 600; }
.pt-catch-inner.good em { color: var(--c2); }

/* longterm viz */
.pt-longterm {
  max-height: 0; overflow: hidden;
  transition: max-height .55s ease;
  margin: 0 0 0 0;
}
.pt-longterm.open { max-height: 680px; }
.pt-longterm-inner { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 14px; }
.pt-lt-title {
  font-family: 'Space Mono', monospace; font-size: .6rem;
  text-transform: uppercase; letter-spacing: .09em; color: var(--muted);
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
/* network */
.pt-net-row { display: flex; gap: 10px; }
.pt-net-panel { flex: 1; background: var(--bg); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.pt-net-label {
  font-size: .62rem; text-align: center; padding: 6px 0 0;
  font-family: 'Space Mono', monospace; letter-spacing: .06em; text-transform: uppercase;
}
.pt-net-label.bad  { color: rgba(255,100,70,.5); }
.pt-net-label.good { color: rgba(98,201,140,.7); }
canvas.pt-canvas { display: block; width: 100%; }
/* flywheel */
.pt-wheel-row { display: flex; gap: 10px; }
.pt-wheel-panel { flex: 1; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
.pt-wheel-label {
  font-size: .62rem; text-align: center; padding: 7px 0 2px;
  font-family: 'Space Mono', monospace; letter-spacing: .06em; text-transform: uppercase;
}
.pt-wheel-label.bad  { color: rgba(255,100,70,.5); }
.pt-wheel-label.good { color: rgba(98,201,140,.7); }
svg.pt-wheel-svg { display: block; width: 100%; }
@keyframes spinGood { from{transform-origin:50% 50%;transform:rotate(0deg)} to{transform-origin:50% 50%;transform:rotate(360deg)} }
@keyframes spinBad  { from{transform-origin:50% 50%;transform:rotate(0deg)} to{transform-origin:50% 50%;transform:rotate(360deg)} }
.wheel-ring-good { animation: spinGood 5s linear infinite; transform-origin: 50% 50%; }
.wheel-ring-bad  { animation: spinBad  14s linear infinite; transform-origin: 50% 50%; }
.pt-source {
  padding: 0 20px 10px; font-size: .6rem; color: var(--muted);
  font-family: 'Space Mono', monospace; letter-spacing: .04em;
}

/* ──────────── CROSSOVER CHART ──────────── */
.cx-wrap {
  margin-top: 14px; background: var(--bg);
  border-radius: 6px; border: 1px solid var(--border); overflow: hidden;
}
.cx-svg { width: 100%; display: block; }
.cx-dot { cursor: pointer; transition: opacity .2s; }
.cx-dot:hover { opacity: .75; }
.cx-info-panel {
  max-height: 0; overflow: hidden;
  transition: max-height .38s ease; border-top: 1px solid var(--border);
}
.cx-info-panel.open { max-height: 110px; }
.cx-info-inner {
  padding: 12px 20px; display: flex; gap: 14px; align-items: flex-start;
}
.cx-info-tag {
  font-family: 'Space Mono', monospace; font-size: .6rem; color: var(--c3);
  letter-spacing: .1em; text-transform: uppercase; flex-shrink: 0; padding-top: 2px;
}
.cx-info-text { font-size: .8rem; line-height: 1.6; color: var(--text); }
.cx-info-text em { color: var(--c3); font-style: normal; font-weight: 600; }
.cx-source {
  padding: 0 20px 10px; font-size: .6rem; color: var(--muted);
  font-family: 'Space Mono', monospace; letter-spacing: .04em;
}

/* ──────────── RETENTION RACE ──────────── */
.rr-wrap {
  margin-top: 14px; background: var(--bg);
  border-radius: 6px; border: 1px solid var(--border);
  padding: 18px 20px 12px;
}
.rr-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.rr-label {
  width: 148px; flex-shrink: 0;
  font-family: 'Space Mono', monospace; font-size: .58rem;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--muted); line-height: 1.45; transition: color .4s;
}
.rr-label.lit { color: var(--c4); }
.rr-track {
  flex: 1; height: 26px; background: var(--surface2);
  border-radius: 4px; position: relative; overflow: visible;
}
.rr-bar {
  height: 100%; border-radius: 4px; width: 0;
  position: absolute; top: 0; left: 0;
}
.rr-bar.told { background: rgba(255,255,255,.14); transition: width .8s ease-out; }
.rr-bar.why  { background: var(--c4);             transition: width 1.6s ease-out; }
.rr-marker {
  position: absolute; top: -5px; bottom: -5px; width: 1px;

const SECTIONS = ['what','why','evidence','misconception','applications','tip'];
const LABELS   = ['What it is','Why it works','Key evidence','Misconception','Classroom applications','Student-facing tip'];

let currentTech = 0;
let revealedCount = 0;

// ── Build hub cards ──
function buildHub() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  techniques.forEach((t, i) => {
    const acc = getComputedStyle(document.documentElement).getPropertyValue(t.color).trim();
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = `--acc:var(${t.color});`;
    const dots = [1,2,3,4,5].map(n => `<div class="dd${n<=t.perceived?' on':''}"></div>`).join('');
    card.innerHTML = `
      <div class="card-icon">${t.icon}</div>
      <div class="card-num">0${i+1} — Technique</div>
      <div class="card-name">${t.name}</div>
      <div style="flex:1"></div>
      <div class="diff-row">
        <span class="diff-label">Feels hard:</span>
        <div class="diff-dots">${dots}</div>
      </div>
      <div class="card-tip">"${t.tagline}"</div>
    `;
    card.onclick = () => openTechnique(i);
    grid.appendChild(card);
  });
}

// ── Focus view ──
function openTechnique(idx) {
  currentTech = idx;
  revealedCount = 0;
  renderFocus();
  showView('focus');
  document.getElementById('kbdHint').classList.add('show');
  setTimeout(() => document.getElementById('kbdHint').classList.remove('show'), 4000);
}

function renderFocus() {
  const t = techniques[currentTech];
  // Sidebar
  const side = document.getElementById('focusSide');
  const effWidth = (t.effectiveness / 5 * 100) + '%';
  side.innerHTML = `
    <div class="focus-icon">${t.icon}</div>
    <div class="focus-num">0${currentTech+1} — Technique</div>
    <div class="focus-title">${t.name}</div>
    <div class="prog-list" id="progList"></div>
    <div class="eff-block">
      <div class="eff-head">Research effectiveness</div>
      <div class="eff-track"><div class="eff-fill" id="effFill" style="width:0;background:var(${t.color})"></div></div>
      <div class="eff-labels"><span>Low</span><span>High</span></div>
    </div>
  `;
  side.style.setProperty('--acc', `var(${t.color})`);
  setTimeout(() => { document.getElementById('effFill').style.width = effWidth; }, 100);

  // Progress dots
  buildProgressList();

  // Main content
  const main = document.getElementById('focusMain');
  main.style.setProperty('--acc', `var(${t.color})`);
  main.innerHTML = '';

  // ── Vocabulary chips ──
  if (t.vocab && t.vocab.length) {
    const vrow = document.createElement('div');
    vrow.className = 'vocab-row';
    t.vocab.forEach(v => {
      const chip = document.createElement('div');
      chip.className = 'vocab-chip';
      chip.innerHTML = `${v.word}<div class="vocab-def">${v.def}</div>`;
      vrow.appendChild(chip);
    });
    main.appendChild(vrow);
  }
  SECTIONS.forEach((sec, i) => {
    const el = document.createElement('div');
    el.id = `sec-${i}`;
    el.className = sec === 'tip' ? 'sec tip-sec' : 'sec';
    el.style.cssText = sec === 'tip' ? `background:var(${t.color});border-color:var(${t.color})` : '';
    el.innerHTML = buildSection(t, sec, i);
    main.appendChild(el);
  });
  // Reveal hint
  const hint = document.createElement('div');
  hint.className = 'reveal-next'; hint.id = 'revealHint';
  hint.innerHTML = `<span class="pulse">▸</span> Click to reveal next — or press <kbd style="background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:Space Mono,monospace;font-size:.6rem">Space</kbd>`;
  hint.onclick = revealNext;
  main.appendChild(hint);

  document.getElementById('navCounter').textContent = `${currentTech+1} / ${techniques.length}`;
  revealSection(0);
  if (currentTech === 0) setTimeout(initForgettingCurve, 50);
  if (currentTech === 1) setTimeout(initPlotTwist, 50);
  if (currentTech === 2) setTimeout(initCrossover, 50);
  if (currentTech === 3) setTimeout(initRetentionRace, 50);
  if (currentTech === 4) setTimeout(initDualCoding, 50);
  if (currentTech === 5) setTimeout(initConfidenceMeters, 50);
  if (currentTech === 6) setTimeout(initSleepClock, 50);
}

function initSleepClock() {
  const svg = document.getElementById('sc-svg');
  if (!svg) return;
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';

  // Two clock centres
  const clocks = [
    { cx:127, cy:195, label:'Alex', outcome:'No sleep', retLabel:'~35% retained', retColor:'rgba(255,255,255,0.28)', isSlept:false },
    { cx:373, cy:195, label:'Sam',  outcome:'Full night\'s sleep', retLabel:'~75% retained', retColor:'#9e90ee', isSlept:true }
  ];
  const R=102;

  function el(tag, attrs, txt) {
    const e = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
    if (txt !== undefined) e.textContent = txt;
    return e;
  }
  function app(e) { svg.appendChild(e); return e; }

  function hp(h, cx, cy, r) {
    const a = (h/24)*2*Math.PI - Math.PI/2;
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  }
  function arcPath(h1, h2, cx, cy, r) {
    const [x1,y1] = hp(h1, cx, cy, r);
    const [x2,y2] = hp(h2, cx, cy, r);
    const dh = ((h2-h1)+24)%24;
    return `M${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 ${dh>12?1:0} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}`;
  }
  function secPath(h1, h2, cx, cy, r) {
    const [x1,y1] = hp(h1, cx, cy, r);
    const [x2,y2] = hp(h2, cx, cy, r);
    const dh = ((h2-h1)+24)%24;
    return `M${cx} ${cy} L${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 ${dh>12?1:0} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} Z`;
  }

  let activeAnn = -1;

  clocks.forEach((clk, ci) => {
    const {cx, cy} = clk;

    // ── Outer label band header ──
    app(el('text',{x:cx,y:cy-R-26,'text-anchor':'middle','font-size':9.5,
      fill: clk.isSlept ? '#9e90ee' : 'rgba(255,255,255,0.5)',
      'font-family':'Space Mono,monospace','letter-spacing':'0.09em',
      'font-weight':'700'},clk.label.toUpperCase()));
    app(el('text',{x:cx,y:cy-R-13,'text-anchor':'middle','font-size':7.5,
      fill:'rgba(255,255,255,0.2)','font-family':'Outfit,sans-serif',
      'font-style':'italic'},clk.outcome));

    // ── Clock face ──
    app(el('circle',{cx,cy,r:R,fill:'rgba(14,22,38,0.7)',
      stroke:'rgba(255,255,255,0.06)','stroke-width':1}));

    // ── Sleep sector shading (23–07) — only for Sam ──
    if (clk.isSlept) {
      app(el('path',{d:secPath(23,7,cx,cy,R),fill:'rgba(158,144,238,0.07)'}));
      app(el('path',{d:arcPath(23,7,cx,cy,R),fill:'none',
        stroke:'rgba(158,144,238,0.28)','stroke-width':1.2,'stroke-dasharray':'3 2.5'}));
    }

    // ── Hour ticks (every hour, major every 3) ──
    for (let h=0; h<24; h++) {
      const maj = h%3===0;
      const [x1,y1] = hp(h,cx,cy,R);
      const [x2,y2] = hp(h,cx,cy,R-(maj?11:5));
      app(el('line',{x1:x1.toFixed(1),y1:y1.toFixed(1),
        x2:x2.toFixed(1),y2:y2.toFixed(1),
        stroke:maj?'rgba(255,255,255,0.22)':'rgba(255,255,255,0.07)',
        'stroke-width':maj?1.5:0.8}));
    }

    // ── Hour labels every 3h (clear 24h identity) ──
    [0,3,6,9,12,15,18,21].forEach(h => {
      const lbl = String(h).padStart(2,'0');
      const [lx,ly] = hp(h,cx,cy,R-20);
      app(el('text',{x:lx.toFixed(1),y:ly.toFixed(1),'text-anchor':'middle',
        'dominant-baseline':'middle','font-size':h%6===0?8:7,
        fill:h%6===0?'rgba(255,255,255,0.22)':'rgba(255,255,255,0.13)',
        'font-family':'Space Mono,monospace'},lbl));
    });

    // ── Centre label ──
    app(el('text',{x:cx,y:cy-5,'text-anchor':'middle','font-size':7,
      fill:'rgba(255,255,255,0.07)','font-family':'Space Mono,monospace',
      'letter-spacing':'0.1em'},'24H'));
    app(el('text',{x:cx,y:cy+7,'text-anchor':'middle','font-size':7,
      fill:'rgba(255,255,255,0.07)','font-family':'Space Mono,monospace',
      'letter-spacing':'0.1em'},'CLOCK'));

    // ── Sleep zone moon label ──
    const [mx,my] = hp(3,cx,cy,R-48);
    app(el('text',{x:mx.toFixed(1),y:(my-8).toFixed(1),'text-anchor':'middle','font-size':14},clk.isSlept ? '🌙' : '🌙'));
    app(el('text',{x:mx.toFixed(1),y:(my+8).toFixed(1),'text-anchor':'middle','font-size':6.5,
      fill: clk.isSlept ? 'rgba(158,144,238,0.35)' : 'rgba(255,100,80,0.5)',
      'font-family':'Space Mono,monospace','letter-spacing':'0.1em'},clk.isSlept ? 'SLEEP' : 'NO SLEEP'));

    // ── STUDY dot at 20:00 ──
    const [sdx,sdy] = hp(20,cx,cy,R);
    app(el('circle',{cx:sdx.toFixed(1),cy:sdy.toFixed(1),r:4.5,
      fill:'#9e90ee',stroke:'#090d17','stroke-width':1.5}));
    const [slx,sly] = hp(20.8,cx,cy,R+16);
    app(el('text',{x:slx.toFixed(1),y:(sly-3).toFixed(1),'text-anchor':'start','font-size':6.5,
      fill:'rgba(158,144,238,0.6)','font-family':'Space Mono,monospace'},'STUDY'));
    app(el('text',{x:slx.toFixed(1),y:(sly+6).toFixed(1),'text-anchor':'start','font-size':6.5,
      fill:'rgba(158,144,238,0.3)','font-family':'Space Mono,monospace'},'20:00'));

    // ── Study session arc (same on both clocks — 18:00 to 20:00) ──
    const studyArcPath = arcPath(18, 20, cx, cy, R+8);
    const studyArc = app(el('path',{d:studyArcPath, fill:'none',
      stroke:'rgba(255,255,255,0.85)', 'stroke-width':4,
      'stroke-linecap':'round'}));
    studyArc.setAttribute('style','filter:drop-shadow(0 0 3px rgba(255,255,255,0.4))');
    // "STUDYING" label beside arc
    const [stlx,stly] = hp(18.8, cx, cy, R+22);
    app(el('text',{x:stlx.toFixed(1),y:(stly).toFixed(1),'text-anchor':'end','font-size':6.5,
      fill:'rgba(255,255,255,0.45)','font-family':'Space Mono,monospace','letter-spacing':'0.06em'},'STUDYING'));

    // ── Memory arc ──
    if (!clk.isSlept) {
      // Alex — fades through the day, collapses overnight
      const segs=[
        {h1:20,h2:23,c:'rgba(255,255,255,0.42)',sw:2.5},
        {h1:23,h2:7, c:'rgba(255,255,255,0.10)',sw:1.5},
        {h1:7, h2:14,c:'rgba(255,255,255,0.06)',sw:1},
        {h1:14,h2:20,c:'rgba(255,255,255,0.03)',sw:0.8},
      ];
      segs.forEach(s=>app(el('path',{d:arcPath(s.h1,s.h2,cx,cy,R+8),
        fill:'none',stroke:s.c,'stroke-width':s.sw,'stroke-linecap':'round'})));
      // Test dot at 20:00+24h = same position
      const [tx,ty]=hp(20,cx,cy,R+8);
      app(el('circle',{cx:tx.toFixed(1),cy:ty.toFixed(1),r:5,
        fill:'rgba(255,255,255,0.22)',stroke:'rgba(255,255,255,0.15)','stroke-width':1.5}));
      // Large benefit label — two lines
      const [blx,bly]=hp(17.5,cx,cy,R-30);
      app(el('text',{x:blx.toFixed(1),y:(bly-8).toFixed(1),'text-anchor':'middle','font-size':22,
        'font-weight':'700',fill:'rgba(255,255,255,0.22)','font-family':'Space Mono,monospace'},'~35%'));
      app(el('text',{x:blx.toFixed(1),y:(bly+10).toFixed(1),'text-anchor':'middle','font-size':7.5,
        fill:'rgba(255,255,255,0.18)','font-family':'Outfit,sans-serif','font-style':'italic'},'retained next day'));
    } else {
      // Sam — consolidates strongly through sleep, stays high
      const segs=[
        {h1:20,h2:23,c:'rgba(158,144,238,0.5)',sw:2.5},
        {h1:23,h2:7, c:'#9e90ee',              sw:6,glow:true},
        {h1:7, h2:14,c:'rgba(158,144,238,0.85)',sw:3.5},
        {h1:14,h2:20,c:'rgba(158,144,238,0.7)', sw:3},
      ];
      segs.forEach(s=>{
        const p=app(el('path',{d:arcPath(s.h1,s.h2,cx,cy,R+8),
          fill:'none',stroke:s.c,'stroke-width':s.sw,'stroke-linecap':'round'}));
        if (s.glow) p.setAttribute('style','filter:drop-shadow(0 0 5px rgba(158,144,238,0.6))');
      });
      // Test dot
      const [tx,ty]=hp(20,cx,cy,R+8);
      app(el('circle',{cx:tx.toFixed(1),cy:ty.toFixed(1),r:5.5,
        fill:'#9e90ee',stroke:'#090d17','stroke-width':1.5}));
      // Large benefit label — two lines
      const [blx,bly]=hp(13.5,cx,cy,R-30);
      app(el('text',{x:blx.toFixed(1),y:(bly-8).toFixed(1),'text-anchor':'middle','font-size':22,
        'font-weight':'700',fill:'rgba(158,144,238,0.65)','font-family':'Space Mono,monospace'},'~75%'));
      app(el('text',{x:blx.toFixed(1),y:(bly+10).toFixed(1),'text-anchor':'middle','font-size':7.5,
        fill:'rgba(158,144,238,0.45)','font-family':'Outfit,sans-serif','font-style':'italic'},'retained next day'));
    }

    // ── Result outcome badge — removed (benefit shown in large label above) ──
  });

  // ── Divider between clocks ──
  app(el('line',{x1:250,y1:30,x2:250,y2:340,stroke:'rgba(255,255,255,0.06)','stroke-width':1}));

  // Annotation dot short labels and anchor direction per dot

    { shortLines:['memory','collapse'], anchor:'end',   lh:8, ldx:-10, ldy:0  },
    { shortLines:['replay','~03:00'],   anchor:'end',   lh:8, ldx:-10, ldy:0  },
    { shortLines:['stable','all day'],  anchor:'start', lh:8, ldx:10,  ldy:0  },
  ];

  // ── Clickable annotations ──
  const anns = [
    { ci:0, h:10, r:R+8, dotR:4.5, fill:'rgba(255,255,255,0.3)', stroke:'rgba(255,255,255,0.15)',

    // Dot

      fill:ann.fill,stroke:ann.stroke,'stroke-width':1.5}));
    dot.style.cursor = 'pointer';

    // Short label lines beside dot
    const lx = ax + lb.ldx;
    lb.shortLines.forEach((line, li) => {
      app(el('text',{
        x: lx.toFixed(1),
        y: (ay + lb.ldy + (li===0 ? -lb.lh/2 : lb.lh/2) + 3).toFixed(1),
        'text-anchor': lb.anchor,
        'font-size': 7, fill: dotCol,
        'font-family':'Space Mono,monospace',
        'letter-spacing':'0.04em',
        'pointer-events':'none'

    dot.addEventListener('click', () => {
      const panel = document.getElementById('scInfoPanel');
      const tag   = document.getElementById('scInfoTag');
      const text  = document.getElementById('scInfoText');
      if (activeAnn===ai && panel.classList.contains('open')) {
        panel.classList.remove('open'); activeAnn = -1;
      } else {
        tag.textContent = ann.tag;
        text.textContent = ann.text;
        panel.classList.add('open'); activeAnn = ai;
      }
    });
  });

  // ── Bottom legend ──
  const legY = 375;
  [[60,'rgba(255,255,255,0.25)','Alex — no sleep (~35%)'],[270,'#9e90ee','Sam — with sleep (~75%)']].forEach(([x,col,lbl])=>{

    app(el('text',{x:x+28,y:legY+4,'font-size':8,fill:col,'font-family':'Outfit,sans-serif'},lbl));
  });
}

function initConfidenceMeters() {
  const confBar1 = document.getElementById('cmConfBar1');
  const retBar1  = document.getElementById('cmRetBar1');
  const confVal1 = document.getElementById('cmConfVal1');
  const retVal1  = document.getElementById('cmRetVal1');
  const gapRow1  = document.getElementById('cmGapRow1');
  const gapFill1 = document.getElementById('cmGapFill1');
  const cond2    = document.getElementById('cmCond2');
  const confBar2 = document.getElementById('cmConfBar2');
  const retBar2  = document.getElementById('cmRetBar2');
  const confVal2 = document.getElementById('cmConfVal2');
  const retVal2  = document.getElementById('cmRetVal2');
  const gapRow2  = document.getElementById('cmGapRow2');
  const gapFill2 = document.getElementById('cmGapFill2');
  const result   = document.getElementById('cmResult');
  if (!confBar1) return;

  const CONF1=79, RET1=52;   // re-reading: overconfident
  const CONF2=68, RET2=76;   // metacognition: slightly underconfident = good

  function countCM(el, target, duration) {
    const t0 = performance.now();
    (function tick(now) {
      const p = Math.min(1,(now-t0)/duration);
      const e = 1-Math.pow(1-p,3);
      el.textContent = Math.round(target*e)+'%';
      if (p<1) requestAnimationFrame(tick);
    })(t0);
  }

  // Phase 1 — confidence bar fills first (t=150ms)
  setTimeout(() => {
    confBar1.style.width = CONF1+'%';
    countCM(confVal1, CONF1, 850);
    setTimeout(() => confVal1.classList.add('show'), 200);
  }, 150);

  // Phase 2 — retention bar, then gap reveals (t=1200ms)
  setTimeout(() => {
    retBar1.style.width = RET1+'%';
    countCM(retVal1, RET1, 850);
    setTimeout(() => retVal1.classList.add('show'), 200);
    setTimeout(() => {
      gapFill1.style.left  = RET1+'%';
      gapFill1.style.width = (CONF1-RET1)+'%';
      gapRow1.classList.add('show');
    }, 950);
  }, 1200);

  // Phase 3 — condition 2 fades in (t=2500ms)
  setTimeout(() => {
    cond2.classList.add('show');
    // Both bars fill close together — slight offset creates near-alignment effect
    setTimeout(() => {
      confBar2.style.width = CONF2+'%';
      countCM(confVal2, CONF2, 1000);
      setTimeout(() => confVal2.classList.add('show'), 300);
    }, 350);
    setTimeout(() => {
      retBar2.style.width = RET2+'%';
      countCM(retVal2, RET2, 1000);
      setTimeout(() => retVal2.classList.add('show'), 300);
    }, 600);
    // Gap (small, good) appears
    setTimeout(() => {
      gapFill2.style.left  = CONF2+'%';
      gapFill2.style.width = (RET2-CONF2)+'%';
      gapRow2.classList.add('show');
    }, 1750);
  }, 2500);

  // Phase 4 — result (t=4500ms)
  setTimeout(() => result.classList.add('show'), 4500);
}

function initRetentionRace() {
  const barTold  = document.getElementById('rrBarTold');
  const barWhy   = document.getElementById('rrBarWhy');
  const val1     = document.getElementById('rrVal1');
  const val2     = document.getElementById('rrVal2');
  const marker   = document.getElementById('rrMarker');
  const gapLabel = document.getElementById('rrGapLabel');
  const result   = document.getElementById('rrResult');
  if (!barTold) return;

  const TOLD = 40, WHY = 74;

  function countRR(el, target, duration) {
    const t0 = performance.now();
    (function tick(now) {
      const p = Math.min(1, (now-t0)/duration);
      const e = 1 - Math.pow(1-p, 3);
      el.textContent = Math.round(target*e) + '%';
      if (p < 1) requestAnimationFrame(tick);
    })(t0);
  }

  // Phase 1 — told bar fills (t=150ms)
  setTimeout(() => {
    barTold.style.width = TOLD + '%';
    countRR(val1, TOLD, 800);
    setTimeout(() => val1.classList.add('show'), 200);

function initCrossover() {
  const svg = document.getElementById('cx-svg');
  if (!svg) return;
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';

  const CL=72, CR=448, CT=16, CB=168;
  const H = CB-CT;
  const toY = r => CB - (r/100)*H;
  const x1  = CL + (CR-CL)*0.18;  // practice column
  const x2  = CL + (CR-CL)*0.82;  // test column

  const bY1=toY(89), bY2=toY(38);   // blocked:     89% → 38%
  const iY1=toY(60), iY2=toY(77);   // interleaved: 60% → 77%

  // Crossing point (parametric intersection)
  const t_c   = (iY1-bY1) / ((bY2-bY1) - (iY2-iY1));
  const cross_x = x1 + (x2-x1)*t_c;
  const cross_y = bY1 + (bY2-bY1)*t_c;

  // ── Grid ──

function initForgettingCurve() {
  const svg = document.getElementById('fc-svg');
  if (!svg) return;
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const CL=44, CR=488, CT=14, CB=182; // chart bounds in viewBox
  const W = CR-CL, H = CB-CT;
  const DAYS = 30;

  const toX = d => CL + (d/DAYS)*W;
  const toY = r => CB - (r/100)*H;

  // ── Grid ──
  [25,50,75,100].forEach(r => {
    const y = toY(r);
    const gl = document.createElementNS(ns,'line');
    gl.setAttribute('x1',CL); gl.setAttribute('x2',CR);
    gl.setAttribute('y1',y); gl.setAttribute('y2',y);
    gl.setAttribute('stroke','rgba(255,255,255,0.05)');
    gl.setAttribute('stroke-width','1');
    svg.appendChild(gl);
    const lt = document.createElementNS(ns,'text');
    lt.setAttribute('x', CL-4); lt.setAttribute('y', y+4);
    lt.setAttribute('text-anchor','end'); lt.setAttribute('font-size','8');
    lt.setAttribute('fill','rgba(255,255,255,0.2)'); lt.setAttribute('font-family','Space Mono,monospace');
    lt.textContent = r+'%';
    svg.appendChild(lt);
  });
  [5,10,15,20,25,30].forEach(d => {
    const x = toX(d);
    const gl = document.createElementNS(ns,'line');
    gl.setAttribute('x1',x); gl.setAttribute('x2',x);
    gl.setAttribute('y1',CT); gl.setAttribute('y2',CB);
    gl.setAttribute('stroke','rgba(255,255,255,0.04)');
    gl.setAttribute('stroke-width','1');
    svg.appendChild(gl);
    const lt = document.createElementNS(ns,'text');
    lt.setAttribute('x',x); lt.setAttribute('y',CB+12);
    lt.setAttribute('text-anchor','middle'); lt.setAttribute('font-size','8');
    lt.setAttribute('fill','rgba(255,255,255,0.2)'); lt.setAttribute('font-family','Space Mono,monospace');
    lt.textContent = 'd'+d;
    svg.appendChild(lt);
  });

  // ── Axes ──
  const ax = document.createElementNS(ns,'line');
  ax.setAttribute('x1',CL); ax.setAttribute('x2',CL); ax.setAttribute('y1',CT); ax.setAttribute('y2',CB);
  ax.setAttribute('stroke','rgba(255,255,255,0.12)'); ax.setAttribute('stroke-width','1');
  svg.appendChild(ax);
  const ay = document.createElementNS(ns,'line');
  ay.setAttribute('x1',CL); ay.setAttribute('x2',CR); ay.setAttribute('y1',CB); ay.setAttribute('y2',CB);
  ay.setAttribute('stroke','rgba(255,255,255,0.12)'); ay.setAttribute('stroke-width','1');
  svg.appendChild(ay);

  // ── Curve math ──
  function decayPts(stab, startD, startR, endD) {
    const pts = [];
    for (let d=startD; d<=endD; d+=0.25)
      pts.push([d, Math.max(0, startR * Math.exp(-(d-startD)/stab))]);
    return pts;
  }

  // Normal curve — single study, fast decay
  const normalPts = decayPts(1.8, 0, 100, DAYS);

  // Spaced curve — 4 segments with reviews
  const reviews = [
    { day:1,  retBefore: null, retAfter:95, stab:3.8,  label:'Review 1',
      detail:'<strong>Day 1 — First review.</strong> Retention has already dropped ~25%. Retrieving now halts the curve and roughly quadruples memory stability. A quick Brain Dump or flashcard pass is enough.' },
    { day:5,  retBefore: null, retAfter:90, stab:10,
      label:'Review 2',
      detail:'<strong>Day 5 — Second review.</strong> Spacing ratio ≈ 1:5. Stability now reaches ~10 days. The forgetting curve flattens noticeably. Use retrieval practice — no re-reading.' },
    { day:15, retBefore: null, retAfter:88, stab:26,
      label:'Review 3',
      detail:'<strong>Day 15 — Third review.</strong> Spacing ratio ≈ 1:10 — the optimal ratio identified by modern research. Stability ~26 days. A single session here can sustain retention for nearly a month.' },
  ];

  // Compute retBefore for each review from previous segment
  let segs = [];
  let curStab = 1.4, curRet = 100, curDay = 0;
  reviews.forEach((rv, ri) => {
    segs.push({ pts: decayPts(curStab, curDay, curRet, rv.day), color:'#3dd6c8' });
    rv.retBefore = curRet * Math.exp(-(rv.day - curDay)/curStab);
    curDay = rv.day; curRet = rv.retAfter; curStab = rv.stab;
  });
  segs.push({ pts: decayPts(curStab, curDay, curRet, DAYS) });

  // ── Draw filled area for normal curve ──
  const normArea = normalPts.map(([d,r]) => `${toX(d)},${toY(r)}`).join(' ');
  const areaEl = document.createElementNS(ns,'polygon');
  const floorPts = [[DAYS,0],[0,0]].map(([d,r])=>`${toX(d)},${toY(r)}`).join(' ');
  areaEl.setAttribute('points', normArea+' '+floorPts);
  areaEl.setAttribute('fill','rgba(61,214,200,0.04)');
  svg.appendChild(areaEl);

  // ── Draw normal curve ──
  const normPath = document.createElementNS(ns,'polyline');
  normPath.setAttribute('points', normalPts.map(([d,r])=>`${toX(d)},${toY(r)}`).join(' '));
  normPath.setAttribute('fill','none');
  normPath.setAttribute('stroke','rgba(61,214,200,0.22)');
  normPath.setAttribute('stroke-width','1.5');
  normPath.setAttribute('stroke-dasharray','4 3');
  svg.appendChild(normPath);

  // ── Draw spaced repetition curve segments ──
  segs.forEach(seg => {
    const pl = document.createElementNS(ns,'polyline');
    pl.setAttribute('points', seg.pts.map(([d,r])=>`${toX(d)},${toY(r)}`).join(' '));
    pl.setAttribute('fill','none');
    pl.setAttribute('stroke','#3dd6c8');
    pl.setAttribute('stroke-width','2');
    pl.setAttribute('stroke-linecap','round');
    svg.appendChild(pl);
  });

  // ── Draw vertical review lines + dots ──
  let activeRev = -1;
  reviews.forEach((rv, ri) => {
    const x = toX(rv.day);
    const yBefore = toY(rv.retBefore);
    const yAfter  = toY(rv.retAfter);

    // Vertical jump line
    const jl = document.createElementNS(ns,'line');
    jl.setAttribute('x1',x); jl.setAttribute('x2',x);
    jl.setAttribute('y1',yBefore); jl.setAttribute('y2',yAfter);
    jl.setAttribute('stroke','rgba(61,214,200,0.4)');
    jl.setAttribute('stroke-width','1');
    jl.setAttribute('stroke-dasharray','2 2');
    svg.appendChild(jl);

    // Glow ring
    const ring = document.createElementNS(ns,'circle');
    ring.setAttribute('cx',x); ring.setAttribute('cy',yAfter);
    ring.setAttribute('r','9'); ring.setAttribute('fill','none');
    ring.setAttribute('stroke','rgba(61,214,200,0.2)');
    ring.setAttribute('stroke-width','1');
    ring.className.baseVal = 'fc-dot-ring';
    svg.appendChild(ring);

    // Clickable dot
    const dot = document.createElementNS(ns,'circle');
    dot.setAttribute('cx',x); dot.setAttribute('cy',yAfter);
    dot.setAttribute('r','5'); dot.setAttribute('fill','#3dd6c8');
    dot.setAttribute('stroke','#090d17'); dot.setAttribute('stroke-width','1.5');
    dot.className.baseVal = 'fc-review-dot';
    dot.addEventListener('click', () => {
      const panel = document.getElementById('fcInfoPanel');
      const txt   = document.getElementById('fcInfoText');
      const num   = document.getElementById('fcInfoNum');
      if (activeRev === ri && panel.classList.contains('open')) {
        panel.classList.remove('open'); activeRev=-1;
        dot.setAttribute('fill','#3dd6c8');
      } else {
        panel.classList.add('open');
        txt.innerHTML = rv.detail;
        num.textContent = rv.label;
        activeRev = ri;
        // Reset all dots, highlight active
        svg.querySelectorAll('.fc-review-dot').forEach((d,i) =>
          d.setAttribute('fill', i===ri ? '#090d17' : '#3dd6c8'));
        dot.setAttribute('stroke','#3dd6c8');
        dot.setAttribute('fill','#090d17');
      }
    });
    svg.appendChild(dot);

    // Label above dot
    const lbl = document.createElementNS(ns,'text');
    lbl.setAttribute('x',x); lbl.setAttribute('y',yAfter-12);
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('font-size','7.5');
    lbl.setAttribute('fill','rgba(61,214,200,0.55)'); lbl.setAttribute('font-family','Space Mono,monospace');
    lbl.setAttribute('pointer-events','none');
    lbl.textContent = 'R'+(ri+1);
    svg.appendChild(lbl);
  });

  // ── "Cramming" label on normal curve ──
  const cramLbl = document.createElementNS(ns,'text');
  cramLbl.setAttribute('x', toX(5)); cramLbl.setAttribute('y', toY(16));
  cramLbl.setAttribute('font-size','8'); cramLbl.setAttribute('fill','rgba(61,214,200,0.3)');
  cramLbl.setAttribute('font-family','Outfit,sans-serif'); cramLbl.setAttribute('font-style','italic');
  cramLbl.textContent = 'Cramming / no review';
  svg.appendChild(cramLbl);

  // ── "Spaced" label on spaced curve ──
  const spacedLbl = document.createElementNS(ns,'text');
  spacedLbl.setAttribute('x', toX(21)); spacedLbl.setAttribute('y', toY(81));
  spacedLbl.setAttribute('font-size','8'); spacedLbl.setAttribute('fill','rgba(61,214,200,0.7)');
  spacedLbl.setAttribute('font-family','Outfit,sans-serif'); spacedLbl.setAttribute('font-style','italic');
  spacedLbl.textContent = 'Spaced repetition';
  svg.appendChild(spacedLbl);
}

function initPlotTwist() {
  const barReread    = document.getElementById('ptBarReread');
  const barRetrieval = document.getElementById('ptBarRetrieval');
  const valReread    = document.getElementById('ptValReread');
  const valRetrieval = document.getElementById('ptValRetrieval');
  const tab1         = document.getElementById('ptTab1');
  const tab2         = document.getElementById('ptTab2');
  const question     = document.getElementById('ptQuestion');
  const revealBtn    = document.getElementById('ptRevealBtn');
  const insight      = document.getElementById('ptInsight');
  if (!barReread) return;

  const TRACK_H = 130;
  const phases = {
    1: { reread: 81, retrieval: 67 },
    2: { reread: 40, retrieval: 61 }
  };

  function countUp(el, target, duration) {
    const start = performance.now();
    function tick(now) {
      const p = Math.min(1, (now - start) / duration);
      const ease = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * ease) + '%';
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function applyPhase(p) {
    const d = phases[p];
    barReread.style.height    = (d.reread    / 100 * TRACK_H) + 'px';
    barRetrieval.style.height = (d.retrieval / 100 * TRACK_H) + 'px';
    countUp(valReread,    d.reread,    900);
    countUp(valRetrieval, d.retrieval, 900);
    setTimeout(() => {
      valReread.className    = 'pt-bar-val' + (d.reread > d.retrieval ? ' winner' : ' loser');
      valRetrieval.className = 'pt-bar-val' + (d.retrieval > d.reread  ? ' winner' : ' loser');
    }, 700);
    tab1.className = 'pt-phase-tab' + (p === 1 ? ' active' : '');
    tab2.className = 'pt-phase-tab' + (p === 2 ? ' active' : '');
  }

  setTimeout(() => applyPhase(1), 120);

  tab1.addEventListener('click', () => {
    applyPhase(1);
    question.classList.remove('gone');
    revealBtn.classList.remove('gone');
    insight.classList.remove('open');
  });

  revealBtn.addEventListener('click', () => {
    applyPhase(2);
    question.classList.add('gone');
    revealBtn.classList.add('gone');
    setTimeout(() => {
      insight.classList.add('open');
      setTimeout(() => document.getElementById('ptGoalRow').style.opacity = '1', 300);
    }, 500);
  });
}

function ptSelectGoal(choice) {
  const cramBtn   = document.getElementById('ptGoalCram');
  const learnBtn  = document.getElementById('ptGoalLearn');
  const catch_    = document.getElementById('ptCatch');
  const catchInner= document.getElementById('ptCatchInner');
  const longterm  = document.getElementById('ptLongterm');
  cramBtn.className  = 'pt-goal-btn' + (choice==='cram'  ? ' selected-cram'  : '');
  learnBtn.className = 'pt-goal-btn' + (choice==='learn' ? ' selected-learn' : '');
  catch_.classList.add('open');
  if (choice === 'cram') {
    catchInner.className = 'pt-catch-inner';
    catchInner.innerHTML = `<em>Cramming works — for exactly 24 hours.</em> If you never need this information again, re-reading wins. But how often is that true? Most learning builds on itself: next term, next year, the real world. A strategy that erases itself the moment the test ends is a very expensive loan.`;
  } else {
    catchInner.className = 'pt-catch-inner good';
    catchInner.innerHTML = `Good choice — and the data backs you up. <em>Retrieval practice is the only strategy that keeps paying.</em> The effort that feels like struggling during study is the mechanism that makes the memory last. Difficult now means durable later.`;
  }
  if (!longterm.classList.contains('open')) {
    longterm.classList.add('open');
    setTimeout(initLongtermViz, 200);
  }
}

function initNetworks() {
  ['netCram','netKeep'].forEach(id => {
    const canvas = document.getElementById(id);
    if (!canvas || canvas._init) return;
    canvas._init = true;
    const isCram = id === 'netCram';
    const W = canvas.offsetWidth || 220;
    canvas.width  = W * devicePixelRatio;
    canvas.height = 130 * devicePixelRatio;
    canvas.style.height = '130px';
    const ctx = canvas.getContext('2d');
    ctx.scale(devicePixelRatio, devicePixelRatio);
    const w = W, h = 130;

    const accentCram  = 'rgba(255,100,70,';
    const accentKeep  = 'rgba(98,201,140,';
    const accent = isCram ? accentCram : accentKeep;

    let nodes = [], t = 0, frame;

    function seedNodes() {
      nodes = [];
      const count = isCram ? 12 : 7;
      for (let i=0; i<count; i++) addNode();
    }

    function addNode() {
      nodes.push({
        x: 18 + Math.random()*(w-36),
        y: 14 + Math.random()*(h-28),
        r: 3.5 + Math.random()*2.5,
        age: 0,
        life: isCram ? 80 + Math.random()*60 : Infinity,
        alpha: 0,
        connections: []
      });
    }

    function tick() {
      t++;
      ctx.clearRect(0,0,w,h);

      // Spawn new nodes
      if (!isCram && t % 55 === 0 && nodes.length < 22) addNode();
      if (isCram  && t % 38 === 0 && nodes.length < 14) addNode();

      // Update ages
      nodes.forEach(n => {
        n.age++;
        n.alpha = isCram
          ? n.age < 20 ? n.age/20 : Math.max(0, 1 - (n.age - n.life*.6)/(n.life*.4))
          : Math.min(1, n.age/20);
      });

      // Connect nearby nodes
      for (let i=0; i<nodes.length; i++) {
        for (let j=i+1; j<nodes.length; j++) {
          const a=nodes[i], b=nodes[j];
          const d=Math.hypot(a.x-b.x, a.y-b.y);
          const maxD = isCram ? 45 : 70;
          if (d < maxD) {
            const linkAlpha = Math.min(a.alpha, b.alpha) * (1-d/maxD);
            ctx.beginPath();
            ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
            ctx.strokeStyle = accent + (linkAlpha * (isCram ? 0.25 : 0.35)) + ')';
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

      // Draw nodes
      nodes.forEach(n => {
        if (n.alpha <= 0) return;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
        ctx.fillStyle = accent + n.alpha + ')';
        ctx.fill();
        if (!isCram) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r+3, 0, Math.PI*2);
          ctx.strokeStyle = accent + (n.alpha*0.2) + ')';
          ctx.lineWidth=1; ctx.stroke();
        }
      });

      // Remove dead cram nodes
      if (isCram) nodes = nodes.filter(n => n.age <= n.life);

      frame = requestAnimationFrame(tick);
    }

    seedNodes();
    tick();
    // Store frame ref for cleanup
    canvas._frame = frame;
  });
}

// ── Flywheels ──
function initWheels() {
  const ns = 'http://www.w3.org/2000/svg';

  function buildWheel(id, steps, accentColor, isBad) {
    const svg = document.getElementById(id);
    if (!svg || svg._init) return;
    svg._init = true;
    svg.innerHTML = '';
    const cx=100, cy=82, R=52;
    const n=steps.length;

    function el(tag, attrs, txt) {
      const e=document.createElementNS(ns,tag);
      for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
      if(txt!==undefined) e.textContent=txt;
      return e;
    }

    // Rotating arrow ring
    const ring = document.createElementNS(ns,'g');
    ring.className.baseVal = isBad ? 'wheel-ring-bad' : 'wheel-ring-good';

    // Draw arc segments with arrowheads
    for(let i=0; i<n; i++) {
      const a1=(i/n)*2*Math.PI - Math.PI/2 + 0.18;
      const a2=((i+0.78)/n)*2*Math.PI - Math.PI/2;
      const x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
      const x2=cx+R*Math.cos(a2), y2=cy+R*Math.sin(a2);
      const large = (a2-a1)>Math.PI ? 1:0;
      const path=document.createElementNS(ns,'path');
      path.setAttribute('d',`M${x1.toFixed(1)} ${y1.toFixed(1)} A${R} ${R} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke', accentColor);
      path.setAttribute('stroke-width','2');
      path.setAttribute('stroke-linecap','round');
      path.setAttribute('opacity', isBad ? '0.35' : '0.6');
      ring.appendChild(path);
      // Arrowhead
      const aHead=a2+0.08;
      const hx=cx+R*Math.cos(a2), hy=cy+R*Math.sin(a2);
      const tx=hx+6*Math.cos(aHead+Math.PI/2), ty=hy+6*Math.sin(aHead+Math.PI/2);
      const bx=hx+6*Math.cos(aHead-Math.PI/2), by=hy+6*Math.sin(aHead-Math.PI/2);
      const tp=document.createElementNS(ns,'polygon');
      tp.setAttribute('points',`${hx.toFixed(1)},${hy.toFixed(1)} ${tx.toFixed(1)},${ty.toFixed(1)} ${bx.toFixed(1)},${by.toFixed(1)}`);
      tp.setAttribute('fill',accentColor); tp.setAttribute('opacity', isBad?'0.35':'0.6');
      ring.appendChild(tp);
    }
    svg.appendChild(ring);

    // Step labels
    steps.forEach((s,i) => {
      const angle=(i/n + 0.5/n)*2*Math.PI - Math.PI/2;
      const lr = R+28;
      const lx=cx+lr*Math.cos(angle), ly=cy+lr*Math.sin(angle);
      const words=s.split(' ');
      const line1=words.slice(0,2).join(' '), line2=words.slice(2).join(' ');
      const t1=el('text',{x:lx.toFixed(1),y:(line2?(ly-5):(ly+3)).toFixed(1),
        'text-anchor':'middle','font-size':'6.8','fill':accentColor,
        'font-family':'Outfit,sans-serif','font-weight':'600','opacity': isBad?'0.55':'0.85'},line1);
      svg.appendChild(t1);
      if(line2){const t2=el('text',{x:lx.toFixed(1),y:(ly+6).toFixed(1),
        'text-anchor':'middle','font-size':'6.8','fill':accentColor,
        'font-family':'Outfit,sans-serif','opacity':isBad?'0.55':'0.85'},line2);
        svg.appendChild(t2);}
    });

    // Centre
    svg.appendChild(el('circle',{cx,cy,r:22,fill: isBad?'rgba(255,100,70,0.07)':'rgba(98,201,140,0.07)',
      stroke:accentColor,'stroke-width':'1','opacity':'0.4'}));
    svg.appendChild(el('text',{x:cx,y:cy-5,'text-anchor':'middle','font-size':'8.5',
      fill:accentColor,'font-family':'Outfit,sans-serif','font-weight':'600','opacity': isBad?'0.4':'0.7'},
      isBad ? 'stalls' : 'accelerates'));
    svg.appendChild(el('text',{x:cx,y:cy+8,'text-anchor':'middle','font-size':'7',
      fill:accentColor,'font-family':'Outfit,sans-serif','opacity': isBad?'0.3':'0.55'},
      isBad ? '& stops' : 'over time'));
  }

  buildWheel('wheelBad',
    ['Feels meaningless', 'Don\'t engage', 'Remember nothing', 'Feels hard again'],
    'rgba(255,100,70,1)', true);
  buildWheel('wheelGood',
    ['Know a little', 'Get curious', 'Learn more easily', 'Find it interesting'],
    'rgba(98,201,140,1)', false);
}

function buildProgressList() {
  const list = document.getElementById('progList');
  list.innerHTML = SECTIONS.map((s, i) => `
    <div class="prog-item${i===0?' active':''}" id="prog-${i}" onclick="jumpToSection(${i})">
      <div class="prog-dot"></div>
      <span>${LABELS[i]}</span>
    </div>
  `).join('');
}

function revealSection(idx) {
  const el = document.getElementById(`sec-${idx}`);
  if (el) el.classList.add('show');
  // Update progress
  for (let i = 0; i < SECTIONS.length; i++) {
    const p = document.getElementById(`prog-${i}`);
    if (!p) continue;
    p.className = 'prog-item' + (i < idx ? ' done' : i === idx ? ' active' : '');
  }
  if (idx >= SECTIONS.length - 1) {
    const hint = document.getElementById('revealHint');
    if (hint) hint.style.display = 'none';
  }
}

function revealNext() {
  if (revealedCount < SECTIONS.length - 1) {
    revealedCount++;
    revealSection(revealedCount);
    // Scroll to revealed section
    const el = document.getElementById(`sec-${revealedCount}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function jumpToSection(idx) {
  for (let i = revealedCount; i <= idx; i++) revealSection(i);
  revealedCount = Math.max(revealedCount, idx);
  const el = document.getElementById(`sec-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function navigate(dir) {
  const next = (currentTech + dir + techniques.length) % techniques.length;
  openTechnique(next);
}

// ── Synthesis diagram ──
const edges = [
  { a:1, b:0, label:'Spacing provides the optimal schedule for retrieval sessions' },
  { a:1, b:2, label:'Interleaving defines what to retrieve and in what order' },
  { a:1, b:5, label:'Metacognition monitors which gaps need retrieval' },
  { a:1, b:3, label:'Elaboration deepens what retrieval can access' },
  { a:4, b:3, label:'Dual coding adds visual hooks that elaboration can use' },
  { a:6, b:0, label:'Sleep consolidates the gains from spaced sessions' },
  { a:5, b:0, label:'Metacognition helps plan and evaluate spacing schedules' },
  { a:1, b:6, label:'Sleep cements what retrieval practice has activated' },
  { a:4, b:1, label:'Visual encoding creates stronger cues for retrieval' },
];

// Node positions (in 900×520 viewBox)
const nodePos = [
  { x: 180, y: 120 },  // 0 Spaced Rep
  { x: 450, y: 240 },  // 1 Retrieval — center
  { x: 720, y: 120 },  // 2 Interleaving
  { x: 750, y: 370 },  // 3 Elaboration
  { x: 160, y: 370 },  // 4 Dual Coding
  { x: 450, y: 440 },  // 5 Metacognition
  { x: 290, y: 430 },  // 6 Sleep
];

function buildSynthesis() {
  const svg = document.getElementById('synth-svg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const colors = ['--c1','--c2','--c3','--c4','--c5','--c6','--c7'];

  // Draw edges
  edges.forEach((e, ei) => {
    const p1 = nodePos[e.a], p2 = nodePos[e.b];
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
    line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
    line.setAttribute('stroke', 'rgba(255,255,255,0.1)');
    line.setAttribute('stroke-width', e.a===1||e.b===1 ? '2' : '1.5');
    line.style.cursor = 'pointer';
    line.addEventListener('mouseenter', ev => showTooltip(ev, techniques[e.a].name + ' ↔ ' + techniques[e.b].name, e.label));
    line.addEventListener('mousemove', ev => moveTooltip(ev));
    line.addEventListener('mouseleave', hideTooltip);
    line.addEventListener('mouseenter', () => { line.setAttribute('stroke','rgba(255,255,255,0.45)'); line.setAttribute('stroke-width','3'); });
    line.addEventListener('mouseleave', () => { line.setAttribute('stroke','rgba(255,255,255,0.1)'); line.setAttribute('stroke-width', e.a===1||e.b===1 ? '2' : '1.5'); });
    svg.appendChild(line);
  });

  // Draw nodes
  techniques.forEach((t, i) => {
    const pos = nodePos[i];
    const isCenter = i === 1;
    const r = isCenter ? 52 : 42;

    // Glow circle
    const glow = document.createElementNS(ns, 'circle');
    glow.setAttribute('cx', pos.x); glow.setAttribute('cy', pos.y); glow.setAttribute('r', r + 8);
    glow.setAttribute('fill', 'none');
    glow.setAttribute('stroke', `var(${t.color})`);
    glow.setAttribute('stroke-width', '1'); glow.setAttribute('opacity', '0.2');
    svg.appendChild(glow);

    const bg = document.createElementNS(ns, 'circle');
    bg.setAttribute('cx', pos.x); bg.setAttribute('cy', pos.y); bg.setAttribute('r', r);
    bg.setAttribute('fill', 'var(--surface)');
    bg.setAttribute('stroke', `var(${t.color})`);
    bg.setAttribute('stroke-width', isCenter ? '2.5' : '1.5');
    bg.style.cursor = 'pointer';
    svg.appendChild(bg);

    const ico = document.createElementNS(ns, 'text');
    ico.setAttribute('x', pos.x); ico.setAttribute('y', pos.y - 6);
    ico.setAttribute('text-anchor', 'middle'); ico.setAttribute('dominant-baseline', 'middle');
    ico.setAttribute('font-size', isCenter ? '22' : '18');
    ico.textContent = t.icon; ico.style.cursor = 'pointer';
    svg.appendChild(ico);

    const words = t.name.split(' ');
    const shortName = words.length > 2 ? words.slice(0,2).join(' ') : t.name;
    const lbl = document.createElementNS(ns, 'text');
    lbl.setAttribute('x', pos.x); lbl.setAttribute('y', pos.y + 10);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('font-size', isCenter ? '10' : '9');
    lbl.setAttribute('fill', `var(${t.color})`);
    lbl.setAttribute('font-family', 'Outfit, sans-serif');
    lbl.setAttribute('font-weight', '600');
    lbl.textContent = shortName; lbl.style.cursor = 'pointer';
    svg.appendChild(lbl);

    [bg, ico, lbl, glow].forEach(el => {
      el.addEventListener('click', () => openTechnique(i));
      el.addEventListener('mouseenter', ev => showTooltip(ev, t.name, `Click to explore this technique`));
      el.addEventListener('mousemove', ev => moveTooltip(ev));
      el.addEventListener('mouseleave', hideTooltip);
    });
  });

  // Legend
  const legend = document.createElementNS(ns, 'text');
  legend.setAttribute('x', '450'); legend.setAttribute('y', '505');
  legend.setAttribute('text-anchor', 'middle'); legend.setAttribute('font-size', '9');
  legend.setAttribute('fill', 'rgba(255,255,255,0.25)');
  legend.setAttribute('font-family', 'Outfit, sans-serif');
  legend.textContent = 'Retrieval Practice is the primary engine · Spacing & Interleaving are the schedule · Dual Coding & Elaboration add depth · Metacognition is the compass · Sleep consolidates all';
  svg.appendChild(legend);
}

// ── Tooltip ──
function showTooltip(ev, title, body) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-title').textContent = title;
  document.getElementById('tt-body').textContent = body;
  tt.classList.add('show');
  moveTooltip(ev);
}
function moveTooltip(ev) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (ev.clientX + 12) + 'px';
  tt.style.top  = (ev.clientY - 10) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

// ── View switching ──
function showView(id) {
  document.querySelectorAll('.view').forEach(v => {
    v.classList.toggle('hidden', v.id !== id);
  });
}
function showHub() {
  showView('hub');
  document.getElementById('kbdHint').classList.remove('show');
}
function showSynthesis() {
  buildSynthesis();
  showView('synthesis');
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  const active = document.querySelector('.view:not(.hidden)').id;
  if (active === 'focus') {
    if (e.key === ' ' || e.key === 'ArrowRight' && e.shiftKey) { e.preventDefault(); revealNext(); }
    else if (e.key === 'ArrowRight') navigate(1);
    else if (e.key === 'ArrowLeft')  navigate(-1);
    else if (e.key === 'Escape') showHub();
  } else if (active === 'synthesis') {
    if (e.key === 'Escape') showHub();
  } else if (active === 'hub') {
    if (e.key === 'Enter') openTechnique(0);
  }
});

buildHub();
