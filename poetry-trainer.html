<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poetry Memory Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f3ef;
  --card: #edeae4;
  --card2: #e6e2db;
  --text: #2a2723;
  --mid: #6b6560;
  --soft: #a09890;
  --border: #d4cfc8;
  --border2: #c4bfb8;
  --accent: #4a7a6d;
  --accent-bg: rgba(74,122,109,0.08);
  --accent-hover: rgba(74,122,109,0.14);
  --glow: rgba(74,122,109,0.1);
  --r1: #b04040; --r2: #a06828; --r3: #4a7a6d; --r4: #3a6ea0;
  --r1-bg: rgba(176,64,64,0.08); --r2-bg: rgba(160,104,40,0.09);
  --r3-bg: rgba(74,122,109,0.09); --r4-bg: rgba(58,110,160,0.09);
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 15px;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 2.5rem 1.5rem 4rem;
}
.wrap {
  width: 100%; max-width: 680px;
  display: flex; flex-direction: column; gap: 1.6rem;
}
header { text-align: center; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
h1 {
  font-family: 'Inter', sans-serif; font-size: clamp(1.1rem, 2.8vw, 1.4rem);
  font-weight: 600; color: var(--text); letter-spacing: 0.02em;
}
.poem-meta {
  font-size: 0.78rem; font-weight: 400; color: var(--soft);
  letter-spacing: 0.01em; margin-top: 0.25rem;
}

/* ── POEM INTRO ── */
.poem-intro {
  border-left: 2px solid var(--accent);
  padding: 0.7rem 1rem;
  background: var(--card);
  border-radius: 0 4px 4px 0;
  display: flex; flex-direction: column; gap: 0.35rem;
}
.intro-form {
  font-size: 0.72rem; font-weight: 600; color: var(--accent);
  letter-spacing: 0.03em; text-transform: uppercase;
}
.intro-text {
  font-size: 0.85rem; font-weight: 400; color: var(--mid);
  line-height: 1.55;
}

/* ── POEM SELECTOR ── */
.poem-selector-wrap { display: flex; flex-direction: column; gap: 0.35rem; }
.selector-label {
  font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em;
  color: var(--soft); text-transform: uppercase;
}
.poem-select-outer { position: relative; display: inline-block; width: 100%; }
.poem-select-outer::after {
  content: '▾'; position: absolute; right: 0.9rem; top: 50%;
  transform: translateY(-50%); color: var(--soft); pointer-events: none; font-size: 0.75rem;
}
select#poem-select {
  width: 100%; appearance: none; -webkit-appearance: none;
  font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 400;
  background: var(--card); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.65rem 2rem 0.65rem 0.85rem;
  cursor: pointer; transition: border-color 0.15s; outline: none;
}
select#poem-select:hover, select#poem-select:focus { border-color: var(--accent); }
select#poem-select option { background: var(--card); }

/* ── LEVEL TOGGLE ── */
.level-toggle {
  display: flex; border: 1px solid var(--border); border-radius: 6px;
  align-self: center; overflow: hidden; background: var(--card);
}
.level-btn {
  font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 500;
  letter-spacing: 0.01em; background: transparent; border: none;
  color: var(--soft); padding: 0.55rem 1.3rem; cursor: pointer;
  transition: all 0.15s; line-height: 1.4; text-align: center;
}
.level-btn:first-child { border-right: 1px solid var(--border); }
.level-btn.active { background: white; color: var(--accent); }
.level-btn:hover:not(.active) { color: var(--text); background: var(--accent-bg); }
.level-btn.disabled { opacity: 0.35; cursor: not-allowed; }
.level-sub { display: block; font-size: 0.62rem; font-weight: 400; opacity: 0.65; margin-top: 1px; }

/* ── GRID ── */
.grid-label {
  font-size: 0.7rem; font-weight: 500; letter-spacing: 0.04em;
  color: var(--soft); text-transform: uppercase; margin-bottom: 0.5rem;
}
.line-grid { display: grid; gap: 4px; }
.grid-cell {
  aspect-ratio: 1; border: 1px solid var(--border); background: white;
  border-radius: 3px; transition: background 0.35s, border-color 0.35s;
  position: relative; cursor: default;
}
.grid-cell .cell-num {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: clamp(0.42rem, 1.2vw, 0.58rem);
  font-weight: 500; color: var(--soft);
}
.grid-cell.rated-1 { background: var(--r1-bg); border-color: var(--r1); }
.grid-cell.rated-2 { background: var(--r2-bg); border-color: var(--r2); }
.grid-cell.rated-3 { background: var(--r3-bg); border-color: var(--r3); }
.grid-cell.rated-4 { background: var(--r4-bg); border-color: var(--r4); }
.grid-cell.active  { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }

/* ── ROUND INFO ── */
.round-info {
  font-size: 0.75rem; font-weight: 400; color: var(--soft);
  text-align: center; letter-spacing: 0.01em;
}
.round-info span { color: var(--accent); font-weight: 500; }

/* ── CARD ── */
.card {
  border: 1px solid var(--border); background: white;
  border-radius: 8px; padding: 2rem 1.8rem 1.6rem; position: relative;
  min-height: 150px; display: flex; flex-direction: column;
  justify-content: space-between; gap: 1.4rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.card-label {
  font-size: 0.68rem; font-weight: 500; letter-spacing: 0.05em;
  color: var(--soft); text-transform: uppercase;
  position: absolute; top: 0.75rem; left: 1rem;
}
.card-sublabel {
  font-size: 0.62rem; font-weight: 400; letter-spacing: 0.03em;
  color: var(--border2); text-transform: uppercase;
  position: absolute; top: 0.75rem; right: 1rem;
}
.line-text {
  font-family: 'Lora', serif; font-size: clamp(1.05rem, 2.5vw, 1.25rem);
  font-weight: 400; line-height: 1.9; color: var(--text);
  text-align: center; min-height: 2rem;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.line-text.visible { opacity: 1; transform: translateY(0); }
.line-text em { font-style: italic; color: var(--accent); font-weight: 400; }
.reveal-btn {
  font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500;
  letter-spacing: 0.01em; border: 1px solid var(--border); background: var(--card);
  color: var(--mid); border-radius: 5px; padding: 0.6rem 1.6rem;
  cursor: pointer; transition: all 0.15s; align-self: center;
}
.reveal-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* ── RATING ── */
.rating-section { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
.rating-label {
  font-size: 0.7rem; font-weight: 500; letter-spacing: 0.03em;
  color: var(--soft); text-transform: uppercase;
}
.rating-btns { display: flex; gap: 0.5rem; }
.r-btn {
  font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600;
  border: 1px solid; background: white; border-radius: 5px;
  padding: 0.5rem 0; width: 3.2rem; cursor: pointer; transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 0.2rem; line-height: 1;
}
.r-btn .r-sub { font-size: 0.52rem; font-weight: 400; opacity: 0.7; }
.r-btn[data-r="1"] { border-color: var(--r1); color: var(--r1); }
.r-btn[data-r="2"] { border-color: var(--r2); color: var(--r2); }
.r-btn[data-r="3"] { border-color: var(--r3); color: var(--r3); }
.r-btn[data-r="4"] { border-color: var(--r4); color: var(--r4); }
.r-btn[data-r="1"]:hover { background: var(--r1-bg); }
.r-btn[data-r="2"]:hover { background: var(--r2-bg); }
.r-btn[data-r="3"]:hover { background: var(--r3-bg); }
.r-btn[data-r="4"]:hover { background: var(--r4-bg); }
.rating-section.hidden { display: none; }

/* ── LEGEND ── */
.legend { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.legend-item {
  display: flex; align-items: center; gap: 0.35rem;
  font-size: 0.68rem; font-weight: 400; color: var(--soft);
}
.legend-dot { width: 8px; height: 8px; border-radius: 2px; border: 1px solid; }
.legend-dot.l1 { border-color: var(--r1); background: var(--r1-bg); }
.legend-dot.l2 { border-color: var(--r2); background: var(--r2-bg); }
.legend-dot.l3 { border-color: var(--r3); background: var(--r3-bg); }
.legend-dot.l4 { border-color: var(--r4); background: var(--r4-bg); }

/* ── DONE PANEL ── */
.done-panel {
  display: none; flex-direction: column; align-items: center; gap: 1.2rem;
  padding: 1.8rem; border: 1px solid var(--border); border-radius: 8px;
  background: white; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.done-panel.visible { display: flex; }
.done-title {
  font-size: 0.9rem; font-weight: 600; letter-spacing: 0.05em;
  color: var(--text); text-transform: uppercase;
}
.done-summary { font-size: 0.875rem; color: var(--mid); line-height: 1.6; }
.done-summary strong { color: var(--text); }
.btn-round {
  font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500;
  letter-spacing: 0.01em; border: 1px solid var(--accent); background: var(--accent-bg);
  color: var(--accent); border-radius: 5px; padding: 0.65rem 1.8rem;
  cursor: pointer; transition: all 0.15s;
}
.btn-round:hover { background: var(--accent-hover); }
.btn-restart { border-color: var(--border); color: var(--mid); background: var(--card); }
.btn-restart:hover { border-color: var(--border2); background: var(--card2); }

/* ── BOTTOM BAR ── */
.bottom-bar { display: flex; justify-content: center; }
.btn-ghost {
  font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 400;
  border: 1px solid var(--border); background: transparent; border-radius: 5px;
  color: var(--soft); padding: 0.45rem 1.2rem; cursor: pointer; transition: all 0.15s;
}
.btn-ghost:hover { border-color: var(--border2); color: var(--mid); }

.hint {
  text-align: center; font-size: 0.68rem; font-weight: 400;
  color: var(--border2); letter-spacing: 0.02em;
}

/* ── CLEARED ── */
.cleared-wrap { border-top: 1px solid var(--border); padding-top: 1.2rem; }
.cleared-label {
  font-size: 0.68rem; font-weight: 500; letter-spacing: 0.05em;
  color: var(--r4); text-transform: uppercase; margin-bottom: 0.8rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.cleared-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}
.cleared-lines { display: flex; flex-direction: column; gap: 0.05rem; }
.cleared-line {
  font-family: 'Lora', serif; font-size: clamp(0.88rem, 2vw, 1rem);
  font-weight: 400; line-height: 1.8; color: var(--mid);
  opacity: 0; transform: translateX(-5px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.cleared-line.show { opacity: 1; transform: translateX(0); }
.cleared-line em { font-style: italic; color: var(--r4); }
.cleared-line.placeholder { opacity: 0.18; color: var(--border2); transform: none; }
.cleared-group-label {
  font-size: 0.62rem; font-weight: 500; letter-spacing: 0.05em;
  color: var(--r4); text-transform: uppercase;
  margin-top: 0.9rem; margin-bottom: 0.25rem; opacity: 0.8;
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1 id="poem-title">—</h1>
    <p class="poem-meta" id="poem-author">—</p>
  </header>

  <!-- Poem selector -->
  <div class="poem-selector-wrap">
    <p class="selector-label">Select poem</p>
    <div class="poem-select-outer">
      <select id="poem-select"></select>
    </div>
  </div>

  <!-- Poem intro -->
  <div class="poem-intro" id="poem-intro">
    <p class="intro-form" id="intro-form"></p>
    <p class="intro-text" id="intro-text"></p>
  </div>

  <!-- Level toggle -->
  <div class="level-toggle">
    <button class="level-btn active" id="btn-level1">
      Level 1<span class="level-sub">One line at a time</span>
    </button>
    <button class="level-btn" id="btn-level2">
      Level 2<span class="level-sub" id="l2-sub">Stanzas</span>
    </button>
  </div>

  <!-- Grid -->
  <div>
    <p class="grid-label" id="grid-label">Lines: progress overview</p>
    <div class="line-grid" id="line-grid"></div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item l1"><div class="legend-dot l1"></div>1: No idea</div>
    <div class="legend-item l2"><div class="legend-dot l2"></div>2: Unsure</div>
    <div class="legend-item l3"><div class="legend-dot l3"></div>3: Mostly</div>
    <div class="legend-item l4"><div class="legend-dot l4"></div>4: Got it</div>
  </div>

  <!-- Round info -->
  <p class="round-info" id="round-info">
    Round <span id="round-num">1</span>, <span id="queue-info">—</span>
  </p>

  <!-- Card -->
  <div class="card" id="card">
    <span class="card-label" id="card-label"></span>
    <span class="card-sublabel" id="card-sublabel"></span>
    <div class="line-text" id="line-text"></div>
    <button class="reveal-btn" id="reveal-btn">Reveal ↓</button>
    <div class="rating-section hidden" id="rating-section">
      <p class="rating-label" id="rating-label">How well do you know this line?</p>
      <div class="rating-btns">
        <button class="r-btn" data-r="1">1<span class="r-sub">No idea</span></button>
        <button class="r-btn" data-r="2">2<span class="r-sub">Unsure</span></button>
        <button class="r-btn" data-r="3">3<span class="r-sub">Mostly</span></button>
        <button class="r-btn" data-r="4">4<span class="r-sub">Got it</span></button>
      </div>
    </div>
  </div>

  <!-- Done panel -->
  <div class="done-panel" id="done-panel">
    <p class="done-title">Round complete</p>
    <p class="done-summary" id="done-summary"></p>
    <button class="btn-round" id="btn-next-round">Next round &rarr;</button>
    <button class="btn-round btn-restart" id="btn-full-restart">Start over</button>
  </div>

  <div class="bottom-bar">
    <button class="btn-ghost" id="btn-always-restart">↺ Restart</button>
  </div>

  <p class="hint">Space = reveal &nbsp;·&nbsp; 1–4 = rate</p>

  <!-- Cleared lines -->
  <div class="cleared-wrap" id="cleared-wrap" style="display:none">
    <p class="cleared-label" id="cleared-label">Cleared lines</p>
    <div class="cleared-lines" id="cleared-lines"></div>
  </div>

</div>

// ═══════════════════════════════════════════════════

// Per-poem session state
const poemState = {};
POEMS.forEach(p => {
  poemState[p.id] = {
    ratings:  new Array(p.lines.length).fill(0),
    gRatings: new Array(p.groups.length).fill(0),
    round: 1
  };
});

let currentPoem = POEMS[0];
let level = 1;
let queue = [], queuePos = 0, revealed = false;

// ── Populate selector ──
const sel = document.getElementById('poem-select');
POEMS.forEach((p, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = p.title + '  ·  ' + p.author;
  sel.appendChild(opt);
});

// ── Build grid ──
function buildGrid() {
  const gridEl = document.getElementById('line-grid');
  gridEl.innerHTML = '';
  const n = currentPoem.lines.length;
  gridEl.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
  currentPoem.lines.forEach((_, i) => {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.id = 'cell-' + i;
    cell.innerHTML = `<span class="cell-num">${i+1}</span>`;
    gridEl.appendChild(cell);
  });
}

function getState() { return poemState[currentPoem.id]; }

function buildQueue() {
  const st = getState();
  queuePos = 0;
  if (level === 1) {
    if (st.round === 1) {
      queue = currentPoem.lines.map((_,i) => i);
    } else {
      queue = currentPoem.lines.map((_,i) => i).filter(i => st.ratings[i] > 0 && st.ratings[i] < 4);
      queue.sort((a,b) => a-b);
    }
  } else {
    if (st.round === 1) {
      queue = currentPoem.groups.map((_,i) => i);
    } else {
      queue = currentPoem.groups.map((_,i) => i).filter(i => st.gRatings[i] > 0 && st.gRatings[i] < 4);
    }
  }
}

function updateGrid() {
  const st = getState();
  currentPoem.lines.forEach((_, i) => {
    const cell = document.getElementById('cell-' + i);
    if (!cell) return;
    cell.className = 'grid-cell';
    if (level === 1) {
      if (st.ratings[i] > 0) cell.classList.add('rated-' + st.ratings[i]);
      if (!isDone() && queue[queuePos] === i) cell.classList.add('active');
    } else {
      const gi = currentPoem.groups.findIndex(g => g.lines.includes(i));
      if (gi >= 0 && st.gRatings[gi] > 0) cell.classList.add('rated-' + st.gRatings[gi]);
      if (!isDone() && gi === queue[queuePos]) cell.classList.add('active');
    }
  });
}

function isDone() { return queuePos >= queue.length; }

function updateRoundInfo() {
  const st = getState();
  document.getElementById('round-num').textContent = st.round;
  const remaining = queue.length - queuePos;
  const unit = level === 1
    ? (remaining === 1 ? 'line' : 'lines')
    : (remaining === 1 ? 'part' : 'parts');
  document.getElementById('queue-info').textContent = remaining + ' ' + unit + ' left';
}

function showCard() {
  const st = getState();
  revealed = false;
  const lt = document.getElementById('line-text');
  lt.innerHTML = '';
  lt.classList.remove('visible');
  document.getElementById('reveal-btn').style.display = '';
  document.getElementById('rating-section').classList.add('hidden');
  document.getElementById('done-panel').classList.remove('visible');
  document.getElementById('card').style.display = '';
  document.getElementById('round-info').style.visibility = 'visible';

  if (level === 1) {
    const idx = queue[queuePos];
    document.getElementById('card-label').textContent = 'Line ' + currentPoem.lines[idx].num;
    document.getElementById('card-sublabel').textContent = '';
    document.getElementById('rating-label').textContent = 'How well do you know this line?';
    document.getElementById('reveal-btn').textContent = 'Reveal line ↓';
  } else {
    const gi = queue[queuePos];
    const g = currentPoem.groups[gi];
    document.getElementById('card-label').textContent = g.label;
    document.getElementById('card-sublabel').textContent = g.range;
    document.getElementById('rating-label').textContent = 'How well do you know this part?';
    document.getElementById('reveal-btn').textContent = 'Reveal ↓';
  }
  updateGrid();
  updateRoundInfo();
}

function reveal() {
  if (revealed) return;
  revealed = true;
  const lt = document.getElementById('line-text');
  if (level === 1) {
    const idx = queue[queuePos];
    lt.innerHTML = currentPoem.lines[idx].text;
  } else {
    const gi = queue[queuePos];
    lt.innerHTML = currentPoem.groups[gi].lines.map(i => currentPoem.lines[i].text).join('<br>');
  }
  lt.classList.add('visible');
  document.getElementById('reveal-btn').style.display = 'none';
  document.getElementById('rating-section').classList.remove('hidden');
}

function rate(r) {
  const st = getState();
  if (level === 1) {
    const idx = queue[queuePos];
    st.ratings[idx] = r;
    const cell = document.getElementById('cell-' + idx);
    if (cell) cell.className = 'grid-cell rated-' + r;
  } else {
    const gi = queue[queuePos];
    st.gRatings[gi] = r;
    currentPoem.groups[gi].lines.forEach(i => {
      const cell = document.getElementById('cell-' + i);
      if (cell) cell.className = 'grid-cell rated-' + r;
    });
  }
  updateCleared();
  queuePos++;
  if (queuePos >= queue.length) showDone();
  else showCard();
}

function updateCleared() {
  const st = getState();
  const wrap = document.getElementById('cleared-wrap');
  const container = document.getElementById('cleared-lines');

  if (level === 1) {
    document.getElementById('cleared-label').textContent = 'Cleared lines';
    if (!st.ratings.some(r => r === 4)) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    container.innerHTML = '';
    currentPoem.lines.forEach((line, i) => {
      const div = document.createElement('div');
      if (st.ratings[i] === 4) {
        div.className = 'cleared-line';
        div.innerHTML = line.text;
        container.appendChild(div);
        requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('show')));
      } else {
        div.className = 'cleared-line placeholder';
        div.textContent = '—';
        container.appendChild(div);
      }
    });
  } else {
    document.getElementById('cleared-label').textContent = 'Cleared parts';
    if (!st.gRatings.some(r => r === 4)) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    container.innerHTML = '';
    currentPoem.groups.forEach((g, gi) => {
      if (st.gRatings[gi] === 4) {
        const lbl = document.createElement('div');
        lbl.className = 'cleared-group-label';
        lbl.textContent = g.label + ', ' + g.range;
        container.appendChild(lbl);
        g.lines.forEach(i => {
          const div = document.createElement('div');
          div.className = 'cleared-line';
          div.innerHTML = currentPoem.lines[i].text;
          container.appendChild(div);
          requestAnimationFrame(() => requestAnimationFrame(() => div.classList.add('show')));
        });
      }
    });
  }
}

function showDone() {
  const st = getState();
  document.getElementById('card').style.display = 'none';
  document.getElementById('round-info').style.visibility = 'hidden';
  updateGrid();

  const total = level === 1 ? currentPoem.lines.length : currentPoem.groups.length;
  const arr = level === 1 ? st.ratings : st.gRatings;
  const mastered = arr.filter(r => r === 4).length;
  const weak = arr.filter(r => r === 1 || r === 2).length;
  const remaining = arr.filter(r => r > 0 && r < 4).length;
  const unit = level === 1 ? ['line','lines'] : ['part','parts'];

  let summary = mastered === total
    ? (level === 1 ? 'All lines mastered.' : 'The whole poem is done!')
    : `<strong>${mastered}</strong> ${mastered===1?unit[0]:unit[1]} mastered (rated 4)`
      + (weak > 0 ? `. <strong>${weak}</strong> need more work` : '') + '.';

  document.getElementById('done-summary').innerHTML = summary;
  const nextBtn = document.getElementById('btn-next-round');
  if (mastered === total || remaining === 0) {
    nextBtn.style.display = 'none';
  } else {
    nextBtn.style.display = '';
    nextBtn.textContent = `Next round (${remaining} ${remaining===1?unit[0]:unit[1]}) →`;
  }
  document.getElementById('done-panel').classList.add('visible');
}

function nextRound() {
  const st = getState();
  st.round++;
  buildQueue();
  if (queue.length === 0) { showDone(); return; }
  document.getElementById('done-panel').classList.remove('visible');
  document.getElementById('card').style.display = '';
  showCard();
}

function fullRestart() {
  const p = currentPoem;
  poemState[p.id] = {
    ratings:  new Array(p.lines.length).fill(0),
    gRatings: new Array(p.groups.length).fill(0),
    round: 1
  };
  revealed = false;
  buildQueue();
  document.getElementById('done-panel').classList.remove('visible');
  document.getElementById('card').style.display = '';
  document.getElementById('round-info').style.visibility = 'visible';
  document.getElementById('cleared-wrap').style.display = 'none';
  document.getElementById('cleared-lines').innerHTML = '';
  document.getElementById('rating-section').classList.add('hidden');
  document.getElementById('reveal-btn').style.display = '';
  const lt = document.getElementById('line-text');
  lt.innerHTML = ''; lt.classList.remove('visible');
  updateGrid();
  showCard();
}

function switchPoem(idx) {
  currentPoem = POEMS[idx];
  document.getElementById('poem-title').textContent = currentPoem.title;
  document.getElementById('poem-author').textContent = currentPoem.author;
  document.getElementById('intro-form').textContent = currentPoem.form;
  document.getElementById('intro-text').textContent = currentPoem.intro;
  document.getElementById('l2-sub').textContent = currentPoem.groups.length + ' parts';
  buildGrid();
  fullRestart();
}

function switchLevel(l) {
  if (level === l) return;
  level = l;
  document.getElementById('btn-level1').classList.toggle('active', l===1);
  document.getElementById('btn-level2').classList.toggle('active', l===2);
  document.getElementById('grid-label').textContent = l===1 ? 'Lines: progress overview' : 'Parts — progress overview';
  fullRestart();
}

// ── Init ──
switchPoem(0);

// ── Listeners ──
sel.addEventListener('change', e => switchPoem(parseInt(e.target.value)));
document.getElementById('reveal-btn').addEventListener('click', reveal);
document.querySelectorAll('.r-btn').forEach(btn => {
  btn.addEventListener('click', () => rate(parseInt(btn.dataset.r)));
});
document.getElementById('btn-always-restart').addEventListener('click', fullRestart);
document.getElementById('btn-next-round').addEventListener('click', nextRound);
document.getElementById('btn-full-restart').addEventListener('click', fullRestart);
document.getElementById('btn-level1').addEventListener('click', () => switchLevel(1));
document.getElementById('btn-level2').addEventListener('click', () => switchLevel(2));

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (!revealed) reveal();
  }
  if (['1','2','3','4'].includes(e.key) && revealed) rate(parseInt(e.key));
});
</script>
